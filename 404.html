<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>No encontrado</title>
<meta name="description" content="Pagina no encontrada"/>
<meta property="og:title" content="No encontrado"/>
<meta property="og:description" content="Pagina no encontrada"/>
<meta property="og:type" content="website"/>
<link rel="alternate" type="application/rss+xml" title="La Lengua Suelta" href="/feed.xml"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1e;--surface:#111827;--surface-high:#1a2236;--surface-bright:#222d42;
  --border:rgba(173,198,255,0.08);--border-hover:rgba(173,198,255,0.18);
  --text:#e2e8f8;--text-s:#9ba4b8;--text-d:#5e6578;
  --primary:#adc6ff;--secondary:#4edea3;--tertiary:#ffb2b7;
  --c-economy:#4edea3;--c-society:#ffb2b7;--c-science:#adc6ff;--c-politics:#ffd166;
  --c-sports:#ff8a65;--c-culture:#ce93d8;--c-international:#80deea;--c-general:#90a4ae;
  --c-tech:#adc6ff;--c-weather:#80deea;--c-pop_culture:#ce93d8;
  --fd:'Space Grotesk',sans-serif;--fb:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --r:12px;--rs:8px;--tr:0.2s cubic-bezier(0.4,0,0.2,1);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fb);line-height:1.65;-webkit-font-smoothing:antialiased;font-size:15px}
a{color:var(--primary);text-decoration:none;transition:color var(--tr)}a:hover{color:#c8daff}
.glass{background:rgba(17,24,39,0.6);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r);transition:border-color var(--tr),transform var(--tr),box-shadow var(--tr)}
.glass:hover{border-color:var(--border-hover);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.g-text{background:linear-gradient(135deg,#adc6ff 0%,#4edea3 50%,#ffb2b7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.wrap{max-width:720px;margin:0 auto;padding:0 1.25rem}.wrap-w{max-width:1060px;margin:0 auto;padding:0 1.5rem}
/* Header */
.sh{position:sticky;top:0;z-index:100;background:rgba(10,15,30,0.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.sh .inner{display:flex;align-items:center;justify-content:space-between;padding:0.875rem 0}
.s-logo{font-family:var(--fd);font-weight:700;font-size:1.15rem;letter-spacing:-0.025em;text-decoration:none}
.s-logo .tl{display:block;font-size:0.68rem;font-weight:400;color:var(--text-d);letter-spacing:0.02em;margin-top:0.1rem;font-family:var(--fb)}
.s-nav{display:flex;align-items:center;gap:1.75rem}
.s-nav a{font-size:0.8rem;font-weight:500;color:var(--text-s);transition:color var(--tr);letter-spacing:0.01em}.s-nav a:hover{color:var(--text)}
/* Hero */
.hero{padding:2.5rem 0 1.5rem}
.hero-card{display:grid;grid-template-columns:1.1fr 1fr;gap:0;overflow:hidden;min-height:340px;text-decoration:none;color:inherit}
.hero-img{position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(173,198,255,0.06),rgba(78,222,163,0.04))}
.hero-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1)}
.hero-card:hover .hero-img img{transform:scale(1.03)}
.hero-img .io{position:absolute;inset:0;background:linear-gradient(90deg,transparent 60%,rgba(10,15,30,0.8) 100%)}
.hero-body{padding:2rem 2.25rem;display:flex;flex-direction:column;justify-content:center}
.cb{display:inline-flex;align-items:center;width:fit-content;font-size:0.65rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:0.3rem 0.7rem;border-radius:4px;margin-bottom:1rem}
.hero-body h1{font-family:var(--fd);font-size:1.65rem;font-weight:700;line-height:1.25;letter-spacing:-0.03em;color:var(--text);margin-bottom:0.75rem}
.hero-body .sum{color:var(--text-s);font-size:0.88rem;line-height:1.6;margin-bottom:1.25rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.mr{display:flex;align-items:center;gap:0.4rem;font-size:0.75rem;color:var(--text-d);flex-wrap:wrap}
.ms::before{content:"\00b7";margin:0 0.25rem}
.st{display:inline-flex;font-size:0.65rem;color:var(--text-d);padding:0.15rem 0.45rem;border-radius:4px;background:rgba(173,198,255,0.05);border:1px solid rgba(173,198,255,0.06);margin-left:0.15rem}
/* Category nav */
.cs{display:flex;flex-wrap:wrap;gap:0.5rem;padding:1.5rem 0;border-bottom:1px solid var(--border)}
.cp{padding:0.35rem 0.85rem;border-radius:9999px;font-size:0.72rem;font-weight:500;border:1px solid var(--border);color:var(--text-s);transition:all var(--tr);letter-spacing:0.02em;background:transparent}
.cp:hover{color:var(--text);border-color:var(--border-hover);background:rgba(173,198,255,0.06)}
/* Section head */
.sec{display:flex;align-items:center;gap:0.75rem;margin:2.5rem 0 1.25rem}
.sec::after{content:"";flex:1;height:1px;background:var(--border)}
.sec span{font-family:var(--fd);font-size:0.72rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-d);white-space:nowrap}
/* Card grid */
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;margin-bottom:2rem}
.ac{overflow:hidden;display:flex;flex-direction:column;text-decoration:none;color:inherit}
.ac .ci{position:relative;aspect-ratio:16/9;overflow:hidden;background:var(--surface-high);border-radius:var(--r) var(--r) 0 0}
.ac .ci img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s cubic-bezier(0.4,0,0.2,1)}
.ac:hover .ci img{transform:scale(1.04)}
.ci .bar{position:absolute;top:0;left:0;right:0;height:3px}
.ac .cb2{padding:1.1rem 1.25rem 1.35rem;flex:1;display:flex;flex-direction:column}
.cb2 .cc{display:inline-flex;width:fit-content;font-size:0.62rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.5rem}
.cb2 h3{font-family:var(--fd);font-size:1rem;font-weight:600;line-height:1.35;letter-spacing:-0.015em;color:var(--text);margin-bottom:0.4rem;transition:color var(--tr)}
.ac:hover .cb2 h3{color:var(--primary)}
.cb2 .exc{color:var(--text-s);font-size:0.8rem;line-height:1.55;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:0.65rem}
/* No-image fallback gradient */
.ci-grad{display:flex;align-items:center;justify-content:center;aspect-ratio:16/9;border-radius:var(--r) var(--r) 0 0;position:relative}
.ci-grad .bar{position:absolute;top:0;left:0;right:0;height:3px}
.ci-grad .ci-letter{font-family:var(--fd);font-size:2.5rem;font-weight:700;opacity:0.12;color:var(--text)}

/* Category color utilities */
.c-economy{color:var(--c-economy)}.c-society{color:var(--c-society)}.c-science{color:var(--c-science)}.c-politics{color:var(--c-politics)}.c-sports{color:var(--c-sports)}.c-culture,.c-pop_culture{color:var(--c-culture)}.c-general{color:var(--c-general)}.c-international{color:var(--c-international)}.c-tech{color:var(--c-tech)}.c-weather{color:var(--c-weather)}
.b-economy{background:rgba(78,222,163,0.1);color:var(--c-economy)}.b-society{background:rgba(255,178,183,0.1);color:var(--c-society)}.b-science{background:rgba(173,198,255,0.1);color:var(--c-science)}.b-politics{background:rgba(255,209,102,0.1);color:var(--c-politics)}.b-sports{background:rgba(255,138,101,0.1);color:var(--c-sports)}.b-culture,.b-pop_culture{background:rgba(206,147,216,0.1);color:var(--c-culture)}.b-general{background:rgba(144,164,174,0.1);color:var(--c-general)}.b-international{background:rgba(128,222,234,0.1);color:var(--c-international)}.b-tech{background:rgba(173,198,255,0.1);color:var(--c-tech)}.b-weather{background:rgba(128,222,234,0.1);color:var(--c-weather)}
.bar-economy{background:var(--c-economy)}.bar-society{background:var(--c-society)}.bar-science{background:var(--c-science)}.bar-politics{background:var(--c-politics)}.bar-sports{background:var(--c-sports)}.bar-culture,.bar-pop_culture{background:var(--c-culture)}.bar-general{background:var(--c-general)}.bar-international{background:var(--c-international)}.bar-tech{background:var(--c-tech)}.bar-weather{background:var(--c-weather)}

/* Category gradient backgrounds for fallback images */
.grad-economy{background:linear-gradient(135deg,rgba(78,222,163,0.12),rgba(78,222,163,0.03))}
.grad-society{background:linear-gradient(135deg,rgba(255,178,183,0.12),rgba(255,178,183,0.03))}
.grad-science{background:linear-gradient(135deg,rgba(173,198,255,0.12),rgba(173,198,255,0.03))}
.grad-politics{background:linear-gradient(135deg,rgba(255,209,102,0.12),rgba(255,209,102,0.03))}
.grad-sports{background:linear-gradient(135deg,rgba(255,138,101,0.12),rgba(255,138,101,0.03))}
.grad-culture,.grad-pop_culture{background:linear-gradient(135deg,rgba(206,147,216,0.12),rgba(206,147,216,0.03))}
.grad-general{background:linear-gradient(135deg,rgba(144,164,174,0.12),rgba(144,164,174,0.03))}
.grad-international{background:linear-gradient(135deg,rgba(128,222,234,0.12),rgba(128,222,234,0.03))}
.grad-tech{background:linear-gradient(135deg,rgba(173,198,255,0.12),rgba(173,198,255,0.03))}
.grad-weather{background:linear-gradient(135deg,rgba(128,222,234,0.12),rgba(128,222,234,0.03))}

/* Article page — progress bar */
.pbar{position:fixed;top:0;left:0;height:2px;z-index:200;transition:width 0.1s linear;border-radius:0 2px 2px 0;width:0}
/* Article page — hero image */
.a-hero{position:relative;width:100%;max-height:420px;overflow:hidden}
.a-hero img{width:100%;height:420px;object-fit:cover;display:block}
.a-hero .hg{position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,var(--bg) 100%)}
/* Breadcrumb */
.bc{font-size:0.78rem;color:var(--text-d);margin:1.5rem 0 0.75rem;display:flex;align-items:center;gap:0.4rem}
.bc a{color:var(--text-s)}.bc a:hover{color:var(--text)}
.bc .sep{color:var(--text-d);font-size:0.65rem}
/* Article head */
.ah{margin-bottom:2.25rem}
.ah h1{font-family:var(--fd);font-size:2.1rem;font-weight:700;line-height:1.2;letter-spacing:-0.035em;color:var(--text);margin-bottom:0.6rem}
.ah .sub{font-size:1.05rem;color:var(--text-s);margin-bottom:1.25rem;line-height:1.55;font-weight:400}
.ah .mbar{display:flex;flex-wrap:wrap;align-items:center;gap:1.5rem;font-size:0.78rem;color:var(--text-d);padding:0.85rem 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
/* Prose */
.prose{margin:2.5rem 0}
.prose h2{font-family:var(--fd);font-size:1.4rem;font-weight:700;color:var(--text);margin:2.5rem 0 0.75rem;letter-spacing:-0.025em}
.prose h3{font-family:var(--fd);font-size:1.1rem;font-weight:600;color:var(--text);margin:1.75rem 0 0.5rem}
.prose p{color:var(--text-s);line-height:1.85;margin-bottom:1.35rem;font-size:0.95rem}
.prose strong{color:var(--text);font-weight:600}
.prose em{color:var(--primary);font-style:italic}
.prose blockquote{border-left:3px solid var(--primary);padding:1rem 1.5rem;margin:2rem 0;background:rgba(173,198,255,0.04);border-radius:0 var(--rs) var(--rs) 0}
.prose blockquote p{color:var(--text-s);margin:0;font-size:0.92rem;font-style:italic}
.prose a{color:var(--primary);text-decoration:underline;text-decoration-color:rgba(173,198,255,0.3);text-underline-offset:3px;transition:text-decoration-color var(--tr)}
.prose a:hover{text-decoration-color:var(--primary)}
.prose ul,.prose ol{padding-left:1.5rem;margin-bottom:1.35rem}
.prose li{color:var(--text-s);margin-bottom:0.4rem;line-height:1.75;font-size:0.95rem}
.prose hr{border:none;height:1px;background:var(--border);margin:2.5rem 0}
.prose code{font-size:0.85em;background:var(--surface-high);padding:0.15em 0.35em;border-radius:4px}
/* Tags */
.tl{display:flex;flex-wrap:wrap;gap:0.4rem;margin:2rem 0;padding-top:1.5rem;border-top:1px solid var(--border)}
.tag{font-size:0.72rem;padding:0.25rem 0.65rem;border-radius:9999px;background:var(--surface-high);color:var(--text-d);border:1px solid var(--border)}
/* Sources */
.src-sec{margin:2rem 0}
.src-sec h3{font-family:var(--fd);font-size:0.82rem;font-weight:600;color:var(--text);margin-bottom:0.75rem;letter-spacing:0.02em}
.src-list{list-style:none;padding:0}
.src-item{display:flex;align-items:flex-start;gap:0.75rem;margin-bottom:0.75rem;padding:0.75rem 1rem}
.src-item:hover{border-color:var(--border-hover)}
.src-icon{width:40px;height:40px;border-radius:var(--rs);overflow:hidden;flex-shrink:0;background:var(--surface-high);display:flex;align-items:center;justify-content:center}
.src-icon img{width:100%;height:100%;object-fit:cover}
.src-icon .si-letter{font-family:var(--fd);font-size:1rem;font-weight:700;opacity:0.5;color:var(--text)}
.src-info{flex:1;min-width:0}
.src-info .src-title{font-size:0.82rem;color:var(--text-s);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.src-info .src-name{font-size:0.68rem;color:var(--text-d);margin-top:0.2rem}
.src-item a{color:var(--text-s);text-decoration:none}.src-item a:hover{color:var(--primary)}
/* Rating */
.rat{margin:2.5rem 0;padding:1.75rem;text-align:center}
.rat-t{font-family:var(--fd);font-size:0.82rem;font-weight:600;color:var(--text-s);margin-bottom:0.85rem;letter-spacing:0.02em}
.rat-s{display:inline-flex;gap:0.35rem;margin-bottom:0.65rem}
.rat-s button{background:none;border:none;font-size:1.6rem;cursor:pointer;color:var(--surface-bright);transition:color 0.1s,transform 0.1s;padding:0.125rem;line-height:1}
.rat-s button:hover,.rat-s button.active{color:var(--primary);transform:scale(1.15)}
.rat-s button.filled{color:var(--primary)}
.rat-i{font-size:0.73rem;color:var(--text-d)}
.rat-th{font-size:0.82rem;color:var(--secondary);margin-top:0.5rem;display:none}
/* Prev/Next */
.anav{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:3rem 0 1rem}
.anav a{display:block;padding:1.15rem;color:var(--text);text-decoration:none;transition:border-color var(--tr),transform var(--tr)}
.anav a:hover{border-color:var(--border-hover);transform:translateY(-1px);color:var(--text)}
.nl{font-size:0.65rem;font-weight:600;color:var(--text-d);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.3rem}
.nt{font-family:var(--fd);font-size:0.85rem;font-weight:500;line-height:1.35;color:var(--text-s)}
/* Footer */
.sf{border-top:1px solid var(--border);padding:2.5rem 0;margin-top:4rem}
.sf .inner{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:1rem}
.sf .brand{font-size:0.8rem;color:var(--text-d)}
.sf .links{display:flex;gap:1.5rem}
.sf .links a{font-size:0.75rem;color:var(--text-d)}.sf .links a:hover{color:var(--text-s)}
/* Empty */
.empty{text-align:center;padding:4rem 0;color:var(--text-d)}
/* Responsive */
@media(max-width:900px){.cg{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .hero-card{grid-template-columns:1fr}
  .hero-img{aspect-ratio:16/9;max-height:220px}
  .hero-body{padding:1.5rem}.hero-body h1{font-size:1.35rem}
  .ah h1{font-size:1.6rem}.a-hero img{height:260px}
  .anav{grid-template-columns:1fr}.ah .mbar{gap:0.75rem}
}
@media(max-width:540px){
  .cg{grid-template-columns:1fr}
  .s-nav{gap:1rem}.sh .inner{padding:0.75rem 0}
  .hero-body h1{font-size:1.2rem}
  .ah h1{font-size:1.35rem}.a-hero img{height:200px}
  .prose p{font-size:0.9rem}
  .sf .inner{flex-direction:column;text-align:center}
}
</style>
</head>
<body>
<header class="sh">
<div class="wrap-w inner">
<a href="/" class="s-logo"><span class="g-text">La Lengua Suelta</span><span class="tl">Opinión sin filtros</span></a>
<nav class="s-nav">
<a href="/">Inicio</a>
<a href="/feed.xml">RSS</a>
</nav>
</div>
</header>
<main class="wrap" style="padding:4rem 0;text-align:center">
<h1 style="font-size:1.5rem;margin-bottom:0.5rem">Pagina no encontrada</h1>
<p style="color:var(--text-d);margin-bottom:1.5rem">No hay nada aqui.</p>
<a href="/">Volver al inicio</a>
</main>
<footer class="sf">
<div class="wrap-w inner">
<div class="brand"><span class="g-text" style="font-family:var(--fd);font-weight:600">La Lengua Suelta</span> &middot; 2026</div>
<div class="links">
<a href="/">Inicio</a>
<a href="/feed.xml">RSS</a>
</div>
</div>
</footer>
</body>
</html>
